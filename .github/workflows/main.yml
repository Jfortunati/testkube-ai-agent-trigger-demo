name: Trigger the 'calculator-api-tests' Test Workflow on Testkube

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
    - uses: kubeshop/setup-testkube@v1
      with:
        organization: tkcorg_c6b4dc0ce62fd50a
        environment: tkcenv_2a833be8f77302c9
        token: ${{ secrets.TK_API_TOKEN }}
        url: testkube.io
    - run: |
        testkube run testworkflow calculator-api-tests -f
    
