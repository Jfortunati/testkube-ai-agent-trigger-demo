kind: TestWorkflow
apiVersion: testworkflows.testkube.io/v1
metadata:
  name: calculator-api-tests
  namespace: testkube
  labels:
    demo: ai-agent-triggering
spec:
  content:
    git:
      uri: https://github.com/Jfortunati/testkube-ai-agent-trigger-demo.git
      revision: main
      paths:
      - tests
  container:
    workingDir: /data/repo/tests
    image: python:3.11-slim
  services:
    app:
      content:
        git:
          uri: https://github.com/Jfortunati/testkube-ai-agent-trigger-demo.git
          revision: main
          paths:
          - app
      image: python:3.11-slim
      shell: |
        pip install -r /data/repo/app/requirements.txt -q
        python /data/repo/app/app.py
      readinessProbe:
        httpGet:
          path: /health
          port: 5000
        initialDelaySeconds: 5
        periodSeconds: 2
        failureThreshold: 15
  steps:
  - name: Install test dependencies
    shell: pip install -r ./requirements.txt -q
  - name: Run calculator API tests
    shell: python -m pytest ./ -v --tb=short
    env:
    - name: CALCULATOR_HOST
      value: "{{ services.app.0.ip }}"
    - name: CALCULATOR_PORT
      value: "5000"
status:
  health:
    passRate: 0
    flipRate: 0
    overallHealth: 0
